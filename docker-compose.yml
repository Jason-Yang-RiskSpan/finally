# Convenience wrapper for local development / single-host deployment.
# Mirrors the flags in scripts/start_mac.sh so `docker compose up` produces
# the same runtime as the start scripts.

services:
  finally:
    build:
      context: .
      dockerfile: Dockerfile
    image: finally:latest
    container_name: finally-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Sensible defaults; .env can override.
      LLM_MOCK: "${LLM_MOCK:-false}"
    volumes:
      - finally-data:/app/data
    restart: unless-stopped

volumes:
  finally-data:
    name: finally-data
